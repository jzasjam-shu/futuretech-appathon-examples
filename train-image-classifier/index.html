<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Classifier</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Image Classifier using MobileNet</h1>

  <div class="panel">

    <!-- LEFT -->
    <div class="col">
      <div class="camView">
        <video id="video" autoplay muted width="640" height="480"></video>
        <canvas id="canvas"></canvas>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="col">
      <div id="status">Model loading...</div>

      <h2>1. Start Camera</h2>
      <button id="startBtn" disabled>Start Camera</button>

      <h2>2. Save Samples For Training</h2>
      <p>Hold button to collect samples</p>

      <button data-label="Class1" class="sampleBtn" disabled>Add 'Class1' (0 Samples)</button>
      <button data-label="Class2" class="sampleBtn" disabled>Add 'Class2' (0 Samples)</button>

      <h2>3. Train / Save / Load A Model</h2>
      <button id="trainBtn" disabled>Train & Predict</button>
      <button id="saveBtn" disabled>Save</button>
      <button id="loadBtn" disabled>Load</button>
      <button id="resetBtn">Reset</button>
    </div>

  </div>

  <!-- TensorFlow -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
